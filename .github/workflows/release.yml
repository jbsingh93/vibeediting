name: Release

# ARMED — automated releases via changesets + npm OIDC trusted publishing.
# Flow: push a changeset to `main` → this workflow opens/updates a "Version Packages"
# PR (no publish). Merge that PR → this workflow runs `changeset publish`, which
# publishes to npm with provenance. No NPM_TOKEN needed — the OIDC Trusted Publisher
# (jbsingh93/vibeediting → release.yml, action `npm publish`) on npmjs.com verifies the
# workflow identity via the `id-token: write` permission below.
# Requires GitHub Actions billing to be active on the account.
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      id-token: write # npm OIDC trusted publishing — no NPM_TOKEN secret
      contents: write # changesets opens/updates the release PR
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # Node 24: npm CLI >= 11.5.1 is required for OIDC trusted publishing
      # (Node 22 ships npm 10, which fails with E404).
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org

      # Guarantee npm >= 11.5.1 for OIDC trusted publishing, regardless of which
      # npm the installed Node 24.x happens to bundle (24.4.x ships 11.4.2, < 11.5.1).
      - name: Ensure npm supports trusted publishing
        run: npm install -g npm@latest

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Create release PR or publish
        uses: changesets/action@v1
        with:
          publish: npm run changeset:publish
          version: npm run changeset:version
          commit: 'chore: release'
          title: 'chore: release'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
